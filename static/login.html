<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>口コミ監視 | ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f5f0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:380px;
  box-shadow:0 2px 24px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.logo-icon{width:40px;height:40px;background:#1a3d2b;border-radius:10px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
.logo-title{font-size:15px;font-weight:700;color:#1a3d2b;}
.logo-sub{font-size:11px;color:#888;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.sub{font-size:13px;color:#666;margin-bottom:28px;}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:500;color:#444;margin-bottom:6px;}
input{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px 14px;
  font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus{border-color:#1a3d2b;}
.btn{width:100%;background:#1a3d2b;color:#fff;border:none;border-radius:8px;
  padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  margin-top:8px;transition:background .15s;}
.btn:hover{background:#2d6647;}
.err{color:#c0392b;font-size:12px;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">★</div>
    <div><div class="logo-title">口コミ監視</div><div class="logo-sub">飲食店グループ向け</div></div>
  </div>
  <h1>ログイン</h1>
  <p class="sub">メールアドレスとパスワードでアクセスしてください</p>
  <div class="fg"><label>メールアドレス</label><input type="email" id="email" placeholder="your@email.com" autofocus></div>
  <div class="fg"><label>パスワード</label><input type="password" id="pw" placeholder="••••••••"></div>
  <div class="err" id="err">メールアドレスまたはパスワードが違います</div>
  <button class="btn" onclick="login()">ログイン</button>
</div>
<script>
async function login(){
  const email=document.getElementById('email').value;
  const pw=document.getElementById('pw').value;
  const res=await fetch('/api/login',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email,password:pw})});
  if(res.ok){
    const d=await res.json();
    location.href=d.role==='admin'?'/admin':'/';
  } else {
    document.getElementById('err').style.display='block';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
